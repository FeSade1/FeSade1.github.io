<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Popup</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .blur {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;

      backdrop-filter: blur(8px);
      background: rgba(0, 0, 0, 0.2);

      display: flex;
      justify-content: center;
      align-items: center;

      z-index: 9999;
    }

    .popup {
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);

      min-width: 320px;

      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back {
      position: absolute;
      left: 0;
      cursor: pointer;
      font-size: 20px;
      font-weight: bold;
      display: none;
    }

    .title {
      font-weight: bold;
      font-size: 16px;
      text-align: center;
    }

    .switch-container {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .switch {
      position: relative;
      width: 260px;
      height: 40px;
      background: #eee;
      border-radius: 20px;
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .switch-slider {
      position: absolute;
      width: 50%;
      height: 100%;
      background: #007bff;
      border-radius: 20px;
      transition: 0.3s;
      left: 0;
    }

    .switch-option {
      flex: 1;
      text-align: center;
      z-index: 1;
      font-weight: bold;
      color: #555;
    }

    .switch-option.active {
      color: white;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      padding: 10px;
      border-radius: 8px;
      background: #f5f5f5;
      cursor: pointer;
      transition: 0.2s;
    }

    .item:hover {
      background: #e0e0e0;
    }

    .page {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    /* AUTOCOMPLETE */
    .autocomplete {
      position: relative;
      width: 100%;
    }

    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      max-height: 150px;
      overflow-y: auto;
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-top: 5px;
      display: none;
      z-index: 10;
    }

    .autocomplete-item {
      padding: 10px;
      cursor: pointer;
    }

    .autocomplete-item:hover {
      background: #f0f0f0;
    }

    /* VISTORIA */
    .row {
      display: flex;
      gap: 10px;
    }

    .label {
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="blur">
    <div class="popup">

      <div class="header">
        <div class="back" id="backBtn" onclick="goBack()"><</div>
        <div class="title" id="title">Sade.AIO- DespTool</div>
      </div>

      <div id="menu">

        <div class="switch-container">
          <div class="switch" onclick="toggleSwitch()">
            <div class="switch-slider" id="slider"></div>
            <div class="switch-option active" id="atalhosLabel">Atalhos</div>
            <div class="switch-option" id="procuracoesLabel">Procurações</div>
          </div>
        </div>

        <div class="list" id="list"></div>

      </div>

      <div class="page" id="emitirCRLVPage">
        <input type="text" id="placaInput" placeholder="Placa do veículo">
        <button onclick="handleEmitir()">Emitir</button>
      </div>

      <div class="page" id="consultarCPFPage">
        <input type="text" id="cpfInput" placeholder="Digite o CPF">
        <button onclick="handleCPF()">Consultar</button>
      </div>

      <!-- NOVO AUTOCOMPLETE -->
      <div class="page" id="consultarEnderecoPage">
        <input type="text" id="docInput" placeholder="Digite o CPF/CNPJ">

        <div class="autocomplete">
          <input type="text" id="cidadeInput" placeholder="Digite o município">
          <div class="autocomplete-list" id="cidadeList"></div>
        </div>

        <button onclick="handleEndereco()">Consultar</button>
      </div>

      <!-- NOVA PAGE VISTORIA -->
      <div class="page" id="vistoriaPage">
        <div class="label">Salvar como:</div>

        <div class="row">
          <button onclick="baixarVistoria('pdf')">PDF</button>
          <button onclick="baixarVistoria('foto')">Foto</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    let current = 'atalhos';

    const municipios = [
      { nome: "Curitiba", cod: "7535" },
      { nome: "Almirante Tamandaré", cod: "7407" }
    ];

    let selectedCidade = null;

    const atalhos = [
      "Emitir CRLV",
      "Consultar CPF",
      "Consultar Endereços",
      "Preparar dados OS",
      "Baixar vistoria"
    ];

    const procuracoes = [
      "Procuração de Vendedor",
      "Procuração de Comprador",
      "Procuração de Condutor"
    ];

    function renderList() {
      const list = document.getElementById('list');
      list.innerHTML = '';

      const items = current === 'atalhos' ? atalhos : procuracoes;

      items.forEach(text => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerText = text;
        div.onclick = () => handleItemClick(text);
        list.appendChild(div);
      });
    }

    function toggleSwitch() {
      const slider = document.getElementById('slider');
      const atalhosLabel = document.getElementById('atalhosLabel');
      const procuracoesLabel = document.getElementById('procuracoesLabel');

      if (current === 'atalhos') {
        current = 'procuracoes';
        slider.style.left = '50%';
        atalhosLabel.classList.remove('active');
        procuracoesLabel.classList.add('active');
      } else {
        current = 'atalhos';
        slider.style.left = '0%';
        atalhosLabel.classList.add('active');
        procuracoesLabel.classList.remove('active');
      }

      renderList();
    }

    function checkDomain() {
      if (!window.location.hostname.includes("veiculo.detran.pr.gov.br")) {
        alert("Este recurso só funciona no site do Detran PR.");
        return false;
      }
      return true;
    }

    function handleItemClick(text) {
      if (text === "Emitir CRLV") {
        if (!checkDomain()) return;
        openPage("Emitir CRLV", "emitirCRLVPage");
      }

      if (text === "Consultar CPF") {
        if (!checkDomain()) return;
        openPage("Consultar CPF", "consultarCPFPage");
      }

      if (text === "Consultar Endereços") {
        openPage("Consultar Endereços", "consultarEnderecoPage");
      }

      if (text === "Baixar vistoria") {
        openPage("Baixar vistoria", "vistoriaPage");
      }
    }

    function openPage(title, pageId) {
      document.getElementById('menu').style.display = 'none';
      document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
      document.getElementById(pageId).style.display = 'flex';
      document.getElementById('title').innerText = title;
      document.getElementById('backBtn').style.display = 'block';
    }

    function goBack() {
      document.getElementById('menu').style.display = 'block';
      document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
      document.getElementById('title').innerText = 'Sade.AIO- DespTool';
      document.getElementById('backBtn').style.display = 'none';
    }

    function handleEndereco() {
      const doc = document.getElementById('docInput').value;
      if (!selectedCidade) return alert("Selecione um município");

      consultarEndereco(doc, selectedCidade.cod);
    }

    function consultarEndereco(id, cod) {
      alert("Consultar Endereço: " + id + " / " + cod);
    }

    function baixarVistoria(tipo) {
      alert("Baixar vistoria como: " + tipo);
    }

    /* AUTOCOMPLETE */
    const cidadeInput = document.getElementById('cidadeInput');
    const cidadeList = document.getElementById('cidadeList');

    cidadeInput.addEventListener('input', () => {
      const value = cidadeInput.value.toLowerCase();
      cidadeList.innerHTML = '';

      const filtered = municipios.filter(m =>
        m.nome.toLowerCase().includes(value)
      );

      if (!value || filtered.length === 0) {
        cidadeList.style.display = 'none';
        return;
      }

      filtered.forEach(m => {
        const div = document.createElement('div');
        div.className = 'autocomplete-item';
        div.innerText = m.nome;

        div.onclick = () => {
          cidadeInput.value = m.nome;
          selectedCidade = m;
          cidadeList.style.display = 'none';
        };

        cidadeList.appendChild(div);
      });

      cidadeList.style.display = 'block';
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.autocomplete')) {
        cidadeList.style.display = 'none';
      }
    });

    renderList();
  </script>

</body>
</html>
