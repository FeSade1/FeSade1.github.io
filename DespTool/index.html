<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
        .bookmarklet-btn {
          display: inline-block;
          padding: 12px 24px;
          background-color: #007bff;
          color: white !important;
          text-decoration: none !important;
          border-radius: 8px;
          font-weight: bold;
          cursor: move; /* Muda o mouse para indicar que é para arrastar */
          border: 2px dashed #0056b3;
        }
        .instructions {
          margin-top: 10px;
          font-family: sans-serif;
          color: #555;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DespTool Setup</title>
</head>
  <body>
    <div style="text-align: center; padding: 50px;">
    <h1>Instalar Sade.AIO</h1>
    
    <a class="bookmarklet-btn" href='javascript:(async () => {if(typeof loadDespTool === 'function'){loadDespTool();}else {const scriptElement = document.createElement("script");scriptElement.src = "https://fesade1.github.io/DespTool/loadScript.js";document.head.appendChild(scriptElement);}})()'onclick="return false;" style="cursor: move; user-select: none;">
      DespTool
    </a>
  
    <p class="instructions">
      <strong>Como instalar:</strong> Clique no botão acima e 
      <span style="color: #d9534f; font-weight: bold;">arraste-o</span> 
      até a sua barra de favoritos (Ctrl+Shift+B para exibir a barra).
    </p>
  </div>
</body>
</html>
